# analysis_options.yaml
# Strict-ish lint configuration for production Flutter code.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat these as errors, not warnings
    missing_return: error
    dead_code: warning
    unused_import: warning
    unused_local_variable: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Style
    - always_declare_return_types
    - avoid_redundant_argument_values
    - avoid_unnecessary_containers
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields
    - prefer_final_locals
    - sized_box_for_whitespace
    - use_super_parameters

    # Safety
    - avoid_print               # Use proper logging in production
    - avoid_dynamic_calls
    - cast_nullable_to_non_nullable
    - null_check_on_nullable_type_parameter

    # BLoC-specific good practices
    - avoid_public_member_api_docs  # optional — remove if you want doc enforcement
